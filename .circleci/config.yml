
version: 2.1
jobs:
  say-hello:
    machine:
      image: windows-default
    resource_class: windows.medium
    steps:
      - checkout
      - run:
          name: "Say hello"
          command: | 
            "echo Hello, World!"
            curl.exe https://github.com
workflows:
  say-hello-workflow:
    jobs:
      - say-hello
